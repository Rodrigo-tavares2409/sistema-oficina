services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-oficina-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: oficina
      POSTGRES_PASSWORD: oficina
      POSTGRES_DB: sistema_oficina
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
